---
concurrency:
  cancel-in-progress: true
  group: diagnose
jobs:
  diagnose:
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    runs-on: ubuntu-24.04
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-2
          role-to-assume: ${{ vars.OIDC_ROLE_ARN }}
      - name: Running tasks
        run: |
          echo "RUNNING task arns:"
          aws ecs list-tasks --cluster wan-graph-designer \
            --desired-status RUNNING --output text --query 'taskArns'
          for arn in $(aws ecs list-tasks --cluster wan-graph-designer \
            --desired-status RUNNING --output text --query 'taskArns'); do
            aws ecs describe-tasks --cluster wan-graph-designer --tasks "$arn" \
              --query 'tasks[0].[lastStatus,startedAt]' --output text
          done
      - name: Latest optimizer log events
        run: |
          STREAM=$(aws logs describe-log-streams \
            --log-group-name /ecs/wan-graph-designer-optimizer \
            --order-by LastEventTime --descending --max-items 1 \
            --query 'logStreams[0].logStreamName' --output text 2>/dev/null)
          echo "stream: $STREAM"
          aws logs get-log-events \
            --log-group-name /ecs/wan-graph-designer-optimizer \
            --log-stream-name "$STREAM" --limit 60 \
            --query 'events[*].message' --output text 2>/dev/null \
            || echo "no events"
name: Diagnose optimizer
'on':
  workflow_dispatch: {}
