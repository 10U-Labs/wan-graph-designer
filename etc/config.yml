---
# Canonical three-tier WAN design configuration. Operator choices live here, not
# in source: change the design by editing this file. CLI flags override these.
# Keys are kept alphabetical within each block to satisfy yamllint key-ordering.
design:
  # Allow mapbook ROADM nodes to be selected as aggregation/core points.
  allow_roadm_aggregation: false
  # Exact number of core PoPs in the design.
  core_count: 3
  # PoPs barred from every selected role.
  excluded: []
  # PoPs pinned into the aggregation tier. Richmond is pinned (not Norfolk, a
  # single-homed ROADM leaf) so southeast-Virginia demand homes into a PoP that
  # can dual-home to two cores. The Sentinel ICBM wings home onto their serving
  # PoPs: Minot, ND (Dakota Carrier Network) for Minot AFB, Great Falls, MT
  # (VisionNet) for Malmstrom AFB, and Cheyenne for F.E. Warren AFB -- these
  # regional-carrier PoPs replace the old modeled per-base demand weighting.
  # Boston is dual-homed via Cambridge and Stamford (mapbook page 7).
  forced_aggregations:
    - Boston, MA
    - Cheyenne, WY
    - Great Falls, MT
    - Los Angeles, CA
    - Minot, ND
    - New York, NY
    - Portland, OR
    - Richmond, VA
  # PoPs pinned into the core tier. Atlanta anchors the southeast, Dallas the
  # south-central, and McLean the national-capital region.
  forced_cores:
    - Atlanta, GA
    - Dallas, TX
    - McLean, VA
  # Add extra physical Carrier edges to reduce articulation or degree risk.
  resilience_augmentation: true
inputs:
  carrier_edges: data/carrier_edges.csv
  mapbook: f35_sentinel_secret_regions_carrier_400g.kmz
  # Optional source PDF path recorded in the JSON output for provenance.
  mapbook_pdf: ""
  # Optional CSV of Carrier PoP roles; set to "" to disable.
  pop_roles: data/carrier_pop_roles.csv
  regional_edges:
    - data/dcn_edges.csv
    - data/vision_net_edges.csv
  # Regional carrier node coordinates; set to "" to disable regional carriers.
  regional_nodes: data/regional_nodes.csv
output_dir: outputs
tuning:
  # Ceiling (miles) on the data-derived DBSCAN cluster radius.
  cluster_max_radius_miles: 250.0
  # A cluster needs at least this many close access nodes to seed an aggregation.
  cluster_min_points: 2
  # Floor (miles) on the data-derived DBSCAN cluster radius.
  cluster_min_radius_miles: 0.0
  # Compass sectors used to score a core's link spread.
  compass_octants: 8
  # Peak bytes one enumerated core set costs (sizes the search to free RAM).
  core_set_peak_bytes: 160
  # Share of RAM the core enumeration may use at its peak.
  enum_memory_fraction: 0.6
